<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0055FF"/>
      <stop offset="50%" stop-color="#0088FF"/>
      <stop offset="100%" stop-color="#00BBFF"/>
    </linearGradient>
  </defs>
  
  <!-- Pixel fragments dissolving top-left -->
  <rect x="18" y="12" width="4" height="4" fill="#0066FF" opacity="0.5" transform="rotate(-15 20 14)"/>
  <rect x="12" y="18" width="3.5" height="3.5" fill="#0077FF" opacity="0.6"/>
  <rect x="22" y="20" width="3" height="3" fill="#0088FF" opacity="0.4"/>
  <rect x="8" y="24" width="4.5" height="4.5" fill="#0055FF" opacity="0.7"/>
  <rect x="16" y="27" width="3" height="3" fill="#0099FF" opacity="0.5"/>
  <rect x="24" y="28" width="2.5" height="2.5" fill="#0066FF" opacity="0.6"/>
  <rect x="10" y="32" width="3.5" height="3.5" fill="#0077FF" opacity="0.8"/>
  <rect x="20" y="34" width="2.5" height="2.5" fill="#0088FF" opacity="0.4"/>
  <rect x="14" y="38" width="3" height="3" fill="#0066FF" opacity="0.6"/>
  
  <!-- Stylized S - flowing curve -->
  <path d="M38 35 C28 35, 25 42, 30 48 C35 54, 55 52, 60 58 C65 64, 62 72, 55 78 C48 84, 35 86, 30 82 C25 78, 28 72, 35 70" 
        stroke="url(#sGrad)" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- White C letter - clean arc -->
  <path d="M92 42 C82 32, 65 35, 62 48 L62 75 C62 88, 72 95, 85 92 C92 90, 96 85, 96 80" 
        stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Code symbol </> -->
  <text x="68" y="76" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0088FF">&lt;/&gt;</text>
</svg>